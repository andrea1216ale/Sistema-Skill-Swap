version: "3.9"

services:
  db:
    image: mysql:8.0
    container_name: skillswap-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skillswap
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  api:
    build: .
    container_name: skillswap-api
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: skillswap
    volumes:
      - .:/usr/src/app
    command: ["npm", "start"]

volumes:
  db_data:
