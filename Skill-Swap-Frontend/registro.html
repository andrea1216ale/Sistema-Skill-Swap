<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro Skill Swap</title>

<link rel="stylesheet" href="css/style.css">

</head>



<body>



<div class="register-background">


<a href="index.html" class="back-button">
    ← Inicio
</a>


<div class="register-card">

<h1>
Skill Swap
</h1>


<h2>
Crear tu perfil
</h2>


<p>
Completa tus datos para empezar
a intercambiar habilidades.
</p>



<form id="registroForm">


<div class="row">


<input id="nombre"
type="text"
placeholder="Nombre completo"
>


<input id="correo"
type="email"
placeholder="Correo electrónico"
>


</div>



<div class="row">


<input id="password"
type="password"
placeholder="Contraseña"
>


<input id="edad"
type="number"
placeholder="Edad"
>


</div>




<h3>
Idiomas que conoces
</h3>


<div class="options">


<label>
<input type="checkbox">
Español
</label>


<label>
<input type="checkbox">
Inglés
</label>


<label>
<input type="checkbox">
Francés
</label>


<label>
<input type="checkbox">
Portugués
</label>


<label>
<input type="checkbox">
Italiano
</label>


<label>
<input type="checkbox">
Japonés
</label>


</div>





<h3>
Habilidades que tienes
</h3>



<div class="options">


<label>
<input type="checkbox">
Programación
</label>


<label>
<input type="checkbox">
Diseño gráfico
</label>


<label>
<input type="checkbox">
Marketing digital
</label>


<label>
<input type="checkbox">
Fotografía
</label>


<label>
<input type="checkbox">
Cocina
</label>


<label>
<input type="checkbox">
Edición de video
</label>


<label>
<input type="checkbox">
Excel
</label>


<label>
<input type="checkbox">
Inteligencia Artificial
</label>

</div>

<h3>
Nivel principal
</h3>

<select id="nivel">

<option>
Selecciona nivel
</option>


<option>
Principiante
</option>


<option>
Intermedio
</option>


<option>
Avanzado
</option>


</select>




<button type="submit">
Crear cuenta
</button>


</form>


</div>


</div>


<script src="js/app.js"></script>
</body>

</html>
